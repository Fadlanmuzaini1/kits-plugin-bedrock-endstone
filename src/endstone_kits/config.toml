# ============================================================
#  Konfigurasi Plugin Kits
#  File ini otomatis dibuat di folder data plugin saat pertama
#  kali dijalankan. Aman untuk diedit langsung.
# ============================================================

# Prefix yang ditambahkan di depan semua pesan plugin.
# Mendukung kode warna Bedrock dengan "&" (mis. &b = aqua, &c = merah).
prefix = "&8[&bKits&8] &r"

[messages]
no_permission     = "&cKamu tidak punya izin untuk kit ini."
cooldown_active   = "&eTunggu {time} lagi sebelum klaim ulang."
kit_claimed       = "&aKamu berhasil klaim kit {kit}."
kit_not_found     = "&cKit '{kit}' tidak ditemukan."
kit_created       = "&aKit '{kit}' berhasil dibuat."
claim_in_progress = "&eKlaim sebelumnya masih diproses, coba lagi sebentar."
inventory_full    = "&eInventory penuh, {count} stack item tidak muat dan hilang."
kit_already_claimed = "&cKit ini hanya bisa diklaim sekali, dan kamu sudah pernah mengklaimnya."

[cooldown]
# "long"  -> "1 jam 20 menit 5 detik"
# "short" -> "1j 20m 5d"
time_format = "long"

[gui]
enabled = true
title = "Daftar Kit"
show_permission_in_lore = true
show_time_remaining = true

[storage]
kits_file = "kits.json"
database_file = "cooldowns.db"
sqlite_wal_mode = true

[permissions]
# "auto"      -> deteksi otomatis plugin Prime BDS, fallback ke sistem
#                permission bawaan Endstone jika Prime BDS tidak terpasang
# "prime_bds" -> paksa gunakan Prime BDS (error jika tidak ditemukan)
# "native"    -> paksa gunakan sistem permission bawaan Endstone
provider = "auto"
